<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0d12" />
<title>NatGas Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
  :root{
    --bg:#0a0d12; --bg2:#11151c; --bg3:#161b22; --bg4:#1c2128; --bg5:#21262d;
    --border:#1f242c; --border2:#2a313a; --border3:#3a424d;
    --text:#e6edf3; --text2:#9ba3ad; --text3:#6e7681; --text4:#4a525c;
    --blue:#4493f8; --blue2:#1f6feb; --orange:#f0883e; --red:#ff7b72; --green:#3fb950;
    --font:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:var(--font);padding:14px 12px 28px;
    max-width:560px;margin:0 auto;
  }
  .m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .m-title{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
  .m-status{font-size:10px;color:var(--text3);font-family:var(--mono)}
  .price-row{display:flex;gap:10px;margin-bottom:14px}
  .price-card{
    flex:1;background:var(--bg2);border:1px solid var(--border2);
    border-radius:12px;padding:14px 14px 16px;
  }
  .pc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:700;margin-bottom:2px}
  .pc-ticker{font-size:10px;color:var(--text2);font-family:var(--mono);margin-bottom:8px;min-height:13px}
  .pc-val{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px;line-height:1;color:var(--text)}
  .pc-val.dim{color:var(--text3);font-size:18px}
  .pc-chg{font-size:12px;font-weight:600;font-family:var(--mono);margin-top:6px;min-height:15px;color:var(--text3)}
  .m-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:14px}
  .m-card-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:700;margin-bottom:10px}
  .m-chart-wrap{position:relative;height:240px}
  .m-chart-wrap canvas{width:100%!important;height:100%!important}
  .m-spin{display:flex;align-items:center;justify-content:center;height:240px;font-size:11px;color:var(--text3)}
  .hm-card.ft-show-trend #hm-wrap,.hm-card.ft-show-trend #hm-spin{display:none!important}
  .hm-card.ft-show-current #ft-wrap,.hm-card.ft-show-current #ft-spin,.hm-card.ft-show-current #ft-stats{display:none!important}
  .m-toggle{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:2px}
  .m-toggle button{background:none;border:none;color:var(--text2);padding:4px 9px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600;font-family:var(--font)}
  .m-toggle button.on{background:var(--bg4);color:var(--blue)}
  .m-stats{display:none;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .m-stat{display:flex;align-items:baseline;gap:5px}
  .m-stat .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
  .m-stat .now{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
  .m-stat .v{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text2);line-height:1}
  .m-reset{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:10px;font-family:var(--mono);padding:4px 9px;border-radius:5px;cursor:pointer}
  .m-reset:active{background:var(--bg4)}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border3);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="m-head">
    <span class="m-title">NatGas · Mobile</span>
    <span class="m-status" id="m-status"><span class="spin"></span></span>
  </div>

  <div class="price-row">
    <div class="price-card">
      <div class="pc-lbl">Front Month</div>
      <div class="pc-ticker" id="m-front-ticker">—</div>
      <div class="pc-val dim" id="m-front-price">—</div>
      <div class="pc-chg" id="m-front-chg">—</div>
    </div>
    <div class="price-card">
      <div class="pc-lbl">Next Contract</div>
      <div class="pc-ticker" id="m-next-ticker">—</div>
      <div class="pc-val dim" id="m-next-price">—</div>
      <div class="pc-chg" id="m-next-chg">—</div>
    </div>
  </div>

  <!-- Seasonality (overview, compact) -->
  <div class="m-card">
    <div class="m-card-title">Seasonality</div>
    <div id="fw-spin" class="m-spin">Loading NG=F history…</div>
    <div id="fw-season-wrap" class="m-chart-wrap" style="display:none">
      <canvas id="fw-season-canvas"></canvas>
    </div>
  </div>

  <!-- Weather demand (Current heatmap + Forecast trend) -->
  <div class="m-card hm-card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span class="m-card-title" style="margin-bottom:0">Weather Demand</span>
      <div class="m-toggle">
        <button id="ft-btn-current" data-ft-mode="current">Current</button>
        <button id="ft-btn-trend" class="on" data-ft-mode="trend">Forecast trend</button>
      </div>
    </div>
    <div id="ft-stats" class="m-stats">
      <div class="m-stat"><span class="lbl">Now</span><span class="now" id="ft-stat-now">—</span></div>
      <div class="m-stat"><span class="lbl">24h</span><span class="v" id="ft-stat-chg">—</span></div>
      <div class="m-stat"><span class="lbl">7d</span><span class="v" id="ft-stat-range">—</span></div>
    </div>
    <div id="hm-spin" class="m-spin">Loading weather…</div>
    <div id="hm-wrap" class="m-chart-wrap" style="display:none">
      <canvas id="hm-canvas"></canvas>
    </div>
    <div id="ft-spin" class="m-spin" style="display:none"></div>
    <div id="ft-wrap" class="m-chart-wrap" style="display:none">
      <canvas id="ft-canvas"></canvas>
    </div>
  </div>

  <!-- Stage 3 done: prices + seasonality + weather demand (with trend). TA 5m comes next. -->

  <!-- Technical Analysis 5min (price+EMA+BB, volume, RSI, MACD) -->
  <div class="m-card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <span class="m-card-title" style="margin-bottom:0">Technical · 5 Min</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="ta-pat-5m" style="font-size:10px;font-family:var(--mono);color:var(--text2)"></span>
        <button id="ta-reset-5m" class="m-reset">⤢ Reset</button>
      </div>
    </div>
    <div class="bsub" id="ta-sub-5m" style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">—</div>
    <div id="ta-spin-5m" class="m-spin">Loading 5m…</div>
    <div id="ta-wrap-5m" style="display:none">
      <div style="height:280px;position:relative"><canvas id="ta-c-price-5m"></canvas></div>
      <div style="height:70px;position:relative;margin-top:4px"><canvas id="ta-c-vol-5m"></canvas></div>
      <div style="height:100px;position:relative;margin-top:4px"><canvas id="ta-c-rsi-5m"></canvas></div>
      <div style="height:100px;position:relative;margin-top:4px"><canvas id="ta-c-macd-5m"></canvas></div>
    </div>
  </div>

  <!-- Stage 4 done: all five panels (prices, seasonality, weather demand, TA 5m). -->

  <!-- Hidden stubs: shared modules call dbLog()/renderDbg() which expect these
       elements. Keeping them here (hidden) lets the shared code run harmlessly. -->
  <div style="display:none">
    <span id="dbg-count"></span>
    <span id="dbg-dot"></span>
    <div id="dbg-log"></div>
    <span id="ngf-api-count"></span>
    <span id="st-api-count"></span>
    <span id="ta-api-count"></span>
  </div>

  <!-- TEMP diagnostics: shows any script error directly on the page -->
  <div id="m-errbox" style="display:none;margin-top:14px;padding:12px;border:1px solid var(--red);border-radius:10px;background:rgba(255,123,114,0.08);font-family:var(--mono);font-size:11px;color:var(--red);white-space:pre-wrap;word-break:break-word"></div>

<script>
  // Plain (non-module) error catcher — runs even if the module below fails to
  // load/parse, so import-time errors are visible on the phone.
  (function () {
    function show(msg) {
      var b = document.getElementById('m-errbox');
      if (!b) return;
      b.style.display = 'block';
      b.textContent = (b.textContent ? b.textContent + '\n\n' : '') + msg;
    }
    window.addEventListener('error', function (e) {
      var src = e.filename ? (' @ ' + e.filename.split('/').pop() + ':' + e.lineno) : '';
      show('ERROR: ' + (e.message || e.error || 'unknown') + src);
    });
    window.addEventListener('unhandledrejection', function (e) {
      show('PROMISE: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
  })();
</script>

<script type="module">
  // Reuse the SAME logic modules as the desktop app — no duplicated math.
  import { ngfCurrent, ngfNext, ngfFetchQuote, fetchDailyHistory, yahooFetch } from './js/contracts.js';
  import { fetchNGF } from './js/storage.js';
  import { state } from './js/state.js';
  import { renderSeasonChartOverview } from './js/seasonality.js';
  import { ST_API_KEY } from './js/constants.js';
  import { wxLoadHeadless } from './js/weather.js';
  import { renderWeatherHeatmap } from './js/widgets.js';
  import { initForecastTrend } from './js/forecast-trend.js';
  import { taRenderTF, taResetZoomTF } from './js/technical.js';

  const $ = (id) => document.getElementById(id);
  const fmt = (v) => (v != null && isFinite(v)) ? '$' + v.toFixed(3) : '—';

  function setPrice(elId, val) {
    const el = $(elId);
    if (!el) return;
    el.textContent = fmt(val);
    el.classList.toggle('dim', val == null);
  }

  // Previous daily close = most recent daily bar whose Prague date isn't today.
  function prevClose(bars) {
    if (!bars || !bars.length) return null;
    const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Prague' });
    for (let i = bars.length - 1; i >= 0; i--) {
      const d = new Date(bars[i].ts).toLocaleDateString('sv-SE', { timeZone: 'Europe/Prague' });
      if (d !== today) return bars[i].close;
    }
    return null;
  }

  // Format like the desktop: "+0.123 (+1.45%)" and color the element.
  function setChange(elId, cur, prev) {
    const el = $(elId);
    if (!el) return;
    if (cur == null || prev == null || prev === 0) {
      el.textContent = '—';
      el.style.color = 'var(--text3)';
      return;
    }
    const chg = cur - prev;
    const pct = chg / prev * 100;
    const sign = chg >= 0 ? '+' : '';
    el.textContent = sign + chg.toFixed(3) + ' (' + sign + pct.toFixed(2) + '%)';
    el.style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
  }

  async function loadPrices() {
    const status = $('m-status');
    try {
      const cur = ngfCurrent();
      const nxt = cur ? ngfNext(cur) : null;
      if (cur) $('m-front-ticker').textContent = cur.ticker || '';
      if (nxt) $('m-next-ticker').textContent = nxt.ticker || '';

      // Fetch live quotes + daily history (for prev close) in parallel.
      const [qFront, qNext, hFront, hNext] = await Promise.all([
        cur ? ngfFetchQuote(cur.ticker, true) : Promise.resolve(null),
        nxt ? ngfFetchQuote(nxt.ticker, false) : Promise.resolve(null),
        cur ? fetchDailyHistory(cur.ticker).catch(() => null) : Promise.resolve(null),
        nxt ? fetchDailyHistory(nxt.ticker).catch(() => null) : Promise.resolve(null),
      ]);

      const fLast = qFront?.last ?? null;
      const nLast = qNext?.last ?? null;
      setPrice('m-front-price', fLast);
      setPrice('m-next-price', nLast);
      setChange('m-front-chg', fLast, prevClose(hFront));
      setChange('m-next-chg', nLast, prevClose(hNext));

      const t = new Date().toLocaleTimeString('cs-CZ', { timeZone: 'Europe/Prague', hour: '2-digit', minute: '2-digit' });
      if (status) status.textContent = 'Updated ' + t;
    } catch (e) {
      if (status) status.textContent = 'Error: ' + e.message;
    }
  }

  // Fetch EIA weekly storage (same query as the desktop) — needed for the
  // fair-price overlay on the seasonality chart.
  async function fetchStorageData() {
    const qs = 'api_key=' + ST_API_KEY + '&frequency=weekly&data[0]=value&facets[series][]=NW2_EPG0_SWO_R48_BCF&sort[0][column]=period&sort[0][direction]=asc&length=1000';
    const res = await fetch('https://api.eia.gov/v2/natural-gas/stor/wkly/data?' + qs);
    if (!res.ok) throw new Error('EIA HTTP ' + res.status);
    const json = await res.json();
    const rows = json.response?.data || [];
    const out = rows.map(r => { const v = parseFloat(r.value); return isFinite(v) ? { date: r.period, value: v } : null; }).filter(Boolean);
    out.sort((a, b) => a.date < b.date ? -1 : 1);
    return out;
  }

  async function loadSeasonality() {
    const spin = $('fw-spin');
    try {
      // Storage + NG=F history in parallel; storage feeds the fair-price overlay.
      const [ngf, stor] = await Promise.all([
        fetchNGF(),
        fetchStorageData().catch(() => []),
      ]);
      state.stNgfData = ngf;
      state.stStorageData = stor;
      renderSeasonChartOverview();
    } catch (e) {
      if (spin) { spin.style.display = 'flex'; spin.textContent = 'Seasonality unavailable: ' + e.message; }
    }
  }

  async function loadWeather() {
    const spin = $('hm-spin');
    try {
      state.wxS = await wxLoadHeadless(7);
      renderWeatherHeatmap();
    } catch (e) {
      if (spin) { spin.style.display = 'flex'; spin.textContent = 'Weather unavailable: ' + e.message; }
    }
  }

  // Resolve the front-month contract ticker, same as the desktop TA module.
  function taTicker() {
    const cur = ngfCurrent();
    return (cur && cur.ticker) ? cur.ticker : 'NG=F';
  }

  async function loadTA() {
    const spin = $('ta-spin-5m');
    try {
      const ticker = taTicker();
      // 1d is needed for the Fibonacci overlay; 5m is the chart itself.
      const [raw5m, raw1d] = await Promise.all([
        yahooFetch(ticker, 'interval=5m&range=15d&_t=' + Date.now()),
        yahooFetch(ticker, 'interval=1d&range=5y&_t=' + Date.now()).catch(() => null),
      ]);
      if (raw1d && raw1d.length) state.taData['1d'] = raw1d;
      if (!raw5m || !raw5m.length) throw new Error('5m data unavailable');
      state.taData['5m'] = raw5m;
      taRenderTF('5m', raw5m);
    } catch (e) {
      if (spin) { spin.style.display = 'flex'; spin.textContent = 'TA unavailable: ' + e.message; }
    }
  }

  loadPrices();
  loadSeasonality();
  loadWeather();
  initForecastTrend(); // wires Current/Forecast trend toggle + stats; defaults to trend
  loadTA();
  // Reset zoom/pan on the TA 5m chart.
  const taResetBtn = $('ta-reset-5m');
  if (taResetBtn) taResetBtn.addEventListener('click', () => { try { taResetZoomTF('5m'); } catch (e) {} });
  // Refresh every 60s while the page is open.
  setInterval(loadPrices, 60000);
</script>
</body>
</html>
