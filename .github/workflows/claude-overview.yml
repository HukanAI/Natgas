name: Claude market overview

on:
  schedule:
    # Top of every hour (UTC). GitHub may delay scheduled runs under load.
    - cron: '0 * * * *'
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: write       # needed to push the generated JSON back
  id-token: write       # needed for claude-code-action OIDC auth

concurrency:
  group: claude-overview
  cancel-in-progress: false

jobs:
  overview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.48
          npx playwright install --with-deps chromium

      - name: Serve dashboard locally
        run: |
          npx --yes http-server . -p 8080 -c-1 &
          npx --yes wait-on http://localhost:8080/index.html

      - name: Capture dashboard snapshot
        env:
          DASH_URL: http://localhost:8080/index.html
        run: node scripts/snapshot.mjs

      - name: Generate Claude overview
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write" --max-turns 20'
          prompt: |
            You are an independent natural-gas (Henry Hub, NG=F) futures strategist.

            STEP 1 — Read `data/snapshot.json`. It is a dump of the RAW data shown
            across the whole dashboard (seasonality, weather, fair-value band, COT,
            storage, technicals, futures curve, prices) — NOT pre-scored buy/sell
            signals. Build your OWN view from the raw data; do not assume any prior
            scoring is correct.

            STEP 2 — Weigh the evidence in this priority order, but use ALL of it:
              1. Seasonality: price vs median (seasonality.vsMedian), % higher in
                 1/2/3/4 weeks, typical 4-week move, reliability.
              2. Weather + trend: weather.demand_1_7D and demand_8_16D (pctVs5y,
                 rangePos, aboveMax/belowMin) and weather.trend (direction/vs 5y).
              3. Price vs fair value: fairValue.now/plus7D/plus14D/plus21D — each has
                 fair, the min-max band, and front/next spread + status. Use the band
                 edges (min/max), not just the midpoint.
              4. Price vs median (seasonality.vsMedian / vsMedianDetail).
              then: cot (managed-money net, 5y percentile, ratio), storage (vs 5y,
              surprise), technicals (per timeframe 5m-1w: trend/RSI/MACD/EMA/Bollinger),
              futuresCurve (contango/backwardation from spreadVsFront), production.

            STEP 3 — Decide the overall market state, then produce TWO concrete trade
            ideas:
              • longTerm  — horizon 3-12 weeks (seasonality, weather trend, fair value,
                            storage, COT).
              • shortTerm — horizon 1-10 days (near-term weather, price vs fair,
                            technicals, futures curve).
            Each may be LONG, SHORT or WAIT. If WAIT, set entry/stop/tp1/tp2/riskReward/
            sizing to "n/a" and put the condition you're waiting for in "trigger".
            For directional trades give Entry, Stop-loss, TP1, TP2, Risk:Reward, and
            Sizing in R plus a suggested % account risk (e.g. "1R approx 1% risk").
            Base levels on the actual front price, the fair-value band edges and
            realistic NG=F ranges ($1.5-$6/MMBtu).

            STEP 4 — Write STRICT JSON to `data/claude-overview.json` (Write tool,
            overwrite). Output ONLY valid JSON, no markdown, exactly this shape:

            {
              "generatedAt": "<ISO-8601 now>",
              "sourceSnapshotAt": "<copy snapshot.generatedAt>",
              "frontPrice": <number or null, copy snapshot.price.front>,
              "nextPrice": <number or null, copy snapshot.price.next>,
              "marketState": "<bullish/bearish/neutral + one short clause>",
              "summary": "<3-5 sentences: your independent read of the data>",
              "longTerm": {
                "stance": "LONG" | "SHORT" | "WAIT",
                "conviction": "low" | "medium" | "high",
                "horizon": "3-12 weeks",
                "entry": "<price/zone $/MMBtu or n/a>",
                "stop": "<price or n/a>",
                "tp1": "<price or n/a>",
                "tp2": "<price or n/a>",
                "riskReward": "<e.g. 1:2.5 or n/a>",
                "sizing": "<e.g. '1R approx 1% risk' or n/a>",
                "rationale": "<2-3 sentences citing the priority data>",
                "invalidation": "<what would prove this wrong>",
                "trigger": "<if WAIT, the condition to wait for, else empty>"
              },
              "shortTerm": { ...same shape..., "horizon": "1-10 days" },
              "keyDrivers": ["<3-5 short bullet strings>"],
              "risks": ["<2-3 short bullet strings>"],
              "disclaimer": "Informational only, not financial advice. Auto-generated hourly."
            }

            Rules:
            - If priority data (seasonality, weather, fair value, price vs median) is
              missing/empty, say so in the summary, lower conviction, and lean WAIT for
              the affected trade.
            - Do NOT run any git commands. Only read the snapshot and write the JSON file.

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "natgas-bot"
          git config user.email "natgas-bot@users.noreply.github.com"
          git add data/snapshot.json data/claude-overview.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Claude market overview [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
