name: Claude market overview

on:
  schedule:
    # Top of every hour (UTC). GitHub may delay scheduled runs under load.
    - cron: '0 * * * *'
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: write       # needed to push the generated JSON back
  id-token: write       # needed for claude-code-action OIDC auth

concurrency:
  group: claude-overview
  cancel-in-progress: false

jobs:
  overview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright@1.48
          npx playwright install --with-deps chromium

      - name: Serve dashboard locally
        run: |
          npx --yes http-server . -p 8080 -c-1 &
          npx --yes wait-on http://localhost:8080/index.html

      - name: Capture dashboard snapshot
        env:
          DASH_URL: http://localhost:8080/index.html
          SNAPSHOT_WAIT_MS: '60000'
          SNAPSHOT_SETTLE_MS: '10000'
        run: node scripts/snapshot.mjs

      - name: Generate Claude overview
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Write" --max-turns 20'
          prompt: |
            You are a natural-gas (Henry Hub, NG=F futures) trading analyst.

            STEP 1 — Read the file `data/snapshot.json`. It is an hourly snapshot of a
            natural-gas dashboard: live front/next futures prices, a 7-signal market
            overview (seasonality, short/long-term weather demand, storage, fair price
            vs front and next, managed-money positioning) each with a label, numeric
            score and detail string, plus storage, COT and seasonality KPIs.

            STEP 2 — Synthesize ALL of it into one coherent view and decide a stance:
            "LONG", "SHORT", or "WAIT". Weigh the signals; note confirmations and
            conflicts. Be decisive but honest about uncertainty.

            STEP 3 — Write your answer as STRICT JSON to `data/claude-overview.json`
            (use the Write tool, overwrite it). Output ONLY valid JSON, no markdown,
            matching exactly this shape:

            {
              "generatedAt": "<ISO-8601 timestamp, now>",
              "sourceSnapshotAt": "<copy snapshot.generatedAt>",
              "frontPrice": <number or null, copy snapshot.price.front>,
              "stance": "LONG" | "SHORT" | "WAIT",
              "conviction": "low" | "medium" | "high",
              "headline": "<one punchy sentence, max ~90 chars>",
              "summary": "<2-4 sentences synthesizing the data>",
              "position": {
                "direction": "<long / short / flat-wait>",
                "size": "<e.g. 'small (0.5R)', 'standard (1R)', 'none'>",
                "entry": "<price or zone in $/MMBtu, or 'n/a'>",
                "stop": "<price in $/MMBtu, or 'n/a'>",
                "target": "<price/zone in $/MMBtu, or 'n/a'>",
                "rationale": "<one sentence on the levels>"
              },
              "drivers": ["<3-5 short bullet strings, the key reasons>"],
              "risks": ["<2-3 short bullet strings, what would invalidate this>"],
              "disclaimer": "Informational only, not financial advice. Auto-generated hourly."
            }

            Rules:
            - Base entry/stop/target on the actual front price and signal context; keep
              them realistic for NG=F (typically $1.5-$6/MMBtu). If stance is WAIT, set
              direction "flat-wait", size "none", and entry/stop/target to "n/a".
            - If much of the snapshot is null/empty (data failed to load), say so in the
              summary, lower conviction, and lean toward WAIT.
            - Do NOT run any git commands. Only read the snapshot and write the JSON file.

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "natgas-bot"
          git config user.email "natgas-bot@users.noreply.github.com"
          git add data/snapshot.json data/claude-overview.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Claude market overview [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
