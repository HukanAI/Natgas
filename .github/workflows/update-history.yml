name: Update HDD/CDD history

on:
  schedule:
    # Minute 5 of every hour (UTC). GitHub may delay scheduled runs under load.
    - cron: '5 * * * *'
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: write       # needed so the job can push history.json back

concurrency:
  group: update-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch forecast and append record
        run: node scripts/update-history.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "natgas-bot"
          git config user.email "natgas-bot@users.noreply.github.com"
          git add data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update HDD/CDD history [skip ci]"
            git push
          fi
